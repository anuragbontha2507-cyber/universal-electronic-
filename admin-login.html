<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In — Universal Electronic</title>
  <!-- Google Fonts & FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #0F172A;
      --primary-light: #1E293B;
      --accent: #EC4899; /* Pink accent for administrative feel */
      --accent-glow: #F472B6;
      --accent-gradient: linear-gradient(135deg, #EC4899 0%, #8B5CF6 100%);
      --gold: #F59E0B;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F97316;
      --surface: #F8FAFC;
      --surface-card: #FFFFFF;
      --text-dark: #0F172A;
      --text-muted: #64748B;
      --text-light: #F1F5F9;
      --border: #E2E8F0;
      --glass-border: #E2E8F0;
      --glass-bg: #FFFFFF;
      --glass-blur: none;
      
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.05);
      --transition-fast: 0.2s ease-out;
      --transition-normal: 0.3s ease-out;
    }

    [data-theme="dark"] {
      --primary: #0B0F19;
      --primary-light: #111827;
      --surface: #0B0F19;
      --surface-card: #1E293B;
      --text-dark: #F9FAFB;
      --text-muted: #9CA3AF;
      --border: #334155;
      --glass-border: #334155;
      --glass-bg: #1E293B;
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.2), 0 4px 6px -2px rgba(0,0,0,0.15);
    }

    html {
      background-color: var(--surface);
      transition: background-color var(--transition-normal);
      height: 100%;
    }
    html[data-theme="dark"] {
      background-color: var(--surface);
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      background-color: transparent;
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Flat Clean Background Canvas */
    .liquid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      background: var(--surface);
      transition: background var(--transition-normal);
    }
    
    .liquid-orb {
      display: none;
    }

    /* Glass Login Card */
    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      box-sizing: border-box;
      z-index: 10;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-dark);
      cursor: pointer;
      margin-bottom: 24px;
      text-align: center;
    }

    .login-logo span {
      color: var(--accent);
    }

    .login-logo i {
      color: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.9; }
      100% { transform: scale(1); opacity: 1; }
    }

    .login-card {
      background-color: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: var(--shadow-lg);
      transition: all var(--transition-normal);
    }

    .login-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-dark);
      text-align: center;
    }

    .admin-badge {
      display: inline-block;
      margin: 0 auto 20px auto;
      background: var(--accent-gradient);
      color: white;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-align: center;
      box-shadow: 0 2px 10px rgba(236, 72, 153, 0.3);
    }

    .badge-wrapper {
      display: flex;
      justify-content: center;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i:not(.pwd-toggle) {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px 12px 46px;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dark);
      font-size: 15px;
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background-color var(--transition-fast);
    }
    [data-theme="dark"] .form-input {
      background: var(--surface);
    }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.2);
      background: var(--surface-card);
    }
    [data-theme="dark"] .form-input:focus {
      background: var(--surface-card);
    }

    .pwd-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      transition: color var(--transition-fast);
    }

    .pwd-toggle:hover {
      color: var(--accent);
    }

    .login-btn {
      background: var(--accent-gradient);
      color: white;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      width: 100%;
      border: none;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(236, 72, 153, 0.35);
      transition: all var(--transition-fast);
    }

    .login-btn:hover {
      box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
      transform: translateY(-2px);
    }

    .login-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 10px rgba(236, 72, 153, 0.25);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition-fast);
    }

    .login-footer a:hover {
      color: var(--accent-glow);
    }

    /* Error Toast */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      background: rgba(239, 68, 68, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      font-weight: 600;
      font-size: 14px;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .theme-toggle-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid var(--glass-border);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: var(--text-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all var(--transition-fast);
    }
    [data-theme="dark"] .theme-toggle-btn {
      background: rgba(17, 24, 39, 0.35);
    }

    .theme-toggle-btn:hover {
      background: var(--accent);
      color: white;
      transform: rotate(15deg);
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color var(--transition-fast);
    }

    .back-home:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="liquid-bg"></div>

  <button class="theme-toggle-btn" id="theme-toggle" title="Toggle Theme">
    <i class="fa-solid fa-moon"></i>
  </button>

  <div class="login-container">
    <a href="/index.html" class="back-home">
      <i class="fa-solid fa-arrow-left"></i> Back to Shop
    </a>

    <div class="login-logo" onclick="window.location.href='/index.html'">
      <i class="fa-solid fa-bolt"></i> Universal<span>Electronic</span>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="badge-wrapper">
        <span class="admin-badge">Admin System Console</span>
      </div>
      <h1 class="login-title">Administrator Sign In</h1>
      <p class="login-subtitle">Access controls and dashboard settings.</p>

      <form id="admin-login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Admin Email Address</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="login-email" class="form-input" required placeholder="admin@nexcart.com">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="login-password" class="form-input" required placeholder="••••••••">
            <i class="fa-solid fa-eye pwd-toggle" id="toggle-pwd-login"></i>
          </div>
        </div>

        <button type="submit" class="login-btn">Secure Login</button>
      </form>

      <div class="login-footer">
        Regular Customer? <a href="/login.html">Sign In Here</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    // SHA-256 Hashing Algorithm
    function sha256(ascii) {
      function rightRotate(value, amount) {
        return (value >>> amount) | (value << (32 - amount));
      }
      var mathPow = Math.pow;
      var maxWord = mathPow(2, 32);
      var lengthProperty = 'length';
      var i, j;
      var result = '';
      var words = [];
      var asciiLength = ascii[lengthProperty];
      var hash = sha256.h = sha256.h || [];
      var k = sha256.k = sha256.k || [];
      var primeCounter = k[lengthProperty];
      var isPrime = {};
      for (var candidate = 2; primeCounter < 64; candidate++) {
        if (!isPrime[candidate]) {
          for (i = 0; i < 313; i += candidate) {
            isPrime[i] = candidate;
          }
          hash[primeCounter] = (mathPow(candidate, .5) * maxWord) | 0;
          k[primeCounter++] = (mathPow(candidate, 1/3) * maxWord) | 0;
        }
      }
      hash = hash.slice();
      ascii += '\x80';
      while (ascii[lengthProperty] % 64 - 56) ascii += '\x00';
      for (i = 0; i < ascii[lengthProperty]; i++) {
        j = ascii.charCodeAt(i);
        if (j >> 8) return;
        words[i >> 2] |= j << ((3 - i) % 4) * 8;
      }
      words[words[lengthProperty]] = ((asciiLength * 8) / maxWord) | 0;
      words[words[lengthProperty]] = (asciiLength * 8) | 0;
      var w = [];
      for (i = 0; i < words[lengthProperty]; i += 16) {
        var a = hash[0], b = hash[1], c = hash[2], d = hash[3], e = hash[4], f = hash[5], g = hash[6], h = hash[7];
        for (j = 0; j < 64; j++) {
          if (j < 16) w[j] = words[i + j];
          else {
            var s0 = rightRotate(w[j - 15], 7) ^ rightRotate(w[j - 15], 18) ^ (w[j - 15] >>> 3);
            var s1 = rightRotate(w[j - 2], 17) ^ rightRotate(w[j - 2], 19) ^ (w[j - 2] >>> 10);
            w[j] = (w[j - 16] + s0 + w[j - 7] + s1) | 0;
          }
          var temp1 = (h + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25)) + ((e & f) ^ (~e & g)) + k[j] + w[j]) | 0;
          var temp2 = ((rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + ((a & b) ^ (a & c) ^ (b & c))) | 0;
          h = g;
          g = f;
          f = e;
          e = (d + temp1) | 0;
          d = c;
          c = b;
          b = a;
          a = (temp1 + temp2) | 0;
        }
        hash[0] = (hash[0] + a) | 0;
        hash[1] = (hash[1] + b) | 0;
        hash[2] = (hash[2] + c) | 0;
        hash[3] = (hash[3] + d) | 0;
        hash[4] = (hash[4] + e) | 0;
        hash[5] = (hash[5] + f) | 0;
        hash[6] = (hash[6] + g) | 0;
        hash[7] = (hash[7] + h) | 0;
      }
      for (i = 0; i < 8; i++) {
        for (j = 3; j + 1; j--) {
          var b = (hash[i] >> (j * 8)) & 255;
          result += ((b < 16) ? '0' : '') + b.toString(16);
        }
      }
      return result;
    }

    // Local Storage Helpers
    const DB = {
      get(key) {
        const data = localStorage.getItem('nc_db_' + key);
        return data ? JSON.parse(data) : [];
      },
      set(key, val) {
        localStorage.setItem('nc_db_' + key, JSON.stringify(val));
      }
    };

    // Database Seeder
    function seedDB() {
      if (!localStorage.getItem('nc_db_users') || JSON.parse(localStorage.getItem('nc_db_users')).length === 0) {
        const customerSalt = 'cust_salt_123';
        const adminSalt = 'admin_salt_456';
        const initialUsers = [
          {
            email: 'customer@nexcart.com',
            passwordHash: sha256('Customer@123' + customerSalt),
            salt: customerSalt,
            role: 'customer',
            name: 'John Customer',
            phone: '9876543210',
            altPhone: '9876543219',
            gender: 'Male',
            dob: '2000-06-18',
            loyaltyPoints: 1200,
            referralCode: 'NEX-CUST-777',
            walletBalance: 5000,
            walletHistory: [
              { type: 'Credit', amount: 5000, desc: 'Initial Balance Promotion', date: new Date().toLocaleDateString() }
            ],
            avatar: '',
            twoFactorEnabled: false,
            twoFactorSecret: 'MOCK2FASECRET777',
            registeredAt: new Date().toLocaleDateString()
          },
          {
            email: 'admin@nexcart.com',
            passwordHash: sha256('Admin@123' + adminSalt),
            salt: adminSalt,
            role: 'admin',
            name: 'System Administrator',
            phone: '9999999999',
            altPhone: '',
            gender: 'Female',
            dob: '1990-05-15',
            loyaltyPoints: 0,
            referralCode: 'NEX-ADMIN-000',
            walletBalance: 0,
            walletHistory: [],
            avatar: '',
            twoFactorEnabled: false,
            twoFactorSecret: 'MOCK2FASECRET000',
            registeredAt: new Date().toLocaleDateString()
          }
        ];
        DB.set('users', initialUsers);
      }
      if (!localStorage.getItem('nc_db_sessions')) {
        DB.set('sessions', []);
      }
      if (!localStorage.getItem('nc_db_notifications')) {
        DB.set('notifications', []);
      }
    }

    seedDB();

    // Theme Management
    function initTheme() {
      const savedTheme = localStorage.getItem("nc_theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      updateThemeIcon(savedTheme);
    }

    function updateThemeIcon(theme) {
      const icon = document.querySelector("#theme-toggle i");
      if (theme === "dark") {
        icon.className = "fa-solid fa-sun";
      } else {
        icon.className = "fa-solid fa-moon";
      }
    }

    document.getElementById("theme-toggle").addEventListener("click", () => {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      const newTheme = currentTheme === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", newTheme);
      localStorage.setItem("nc_theme", newTheme);
      updateThemeIcon(newTheme);
    });

    initTheme();

    // Show Toast Notification
    function showToast(message, type = 'error') {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.style.background = type === 'success' ? 'rgba(16, 185, 129, 0.9)' : 'rgba(239, 68, 68, 0.9)';
      
      const icon = document.createElement("i");
      icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
      
      const text = document.createElement("span");
      text.textContent = message;

      toast.appendChild(icon);
      toast.appendChild(text);
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = "slideIn 0.3s reverse cubic-bezier(0.16, 1, 0.3, 1)";
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Password visibility toggle
    const input = document.getElementById("login-password");
    const toggle = document.getElementById("toggle-pwd-login");
    toggle.addEventListener("click", () => {
      if (input.type === "password") {
        input.type = "text";
        toggle.className = "fa-solid fa-eye-slash pwd-toggle";
      } else {
        input.type = "password";
        toggle.className = "fa-solid fa-eye pwd-toggle";
      }
    });

    // Form Submit
    document.getElementById("admin-login-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("login-email").value.trim().toLowerCase();
      const pass = document.getElementById("login-password").value;

      const users = DB.get('users');
      const user = users.find(u => u.email.toLowerCase() === email);

      if (!user) {
        showToast("Account not found.");
        return;
      }

      // Check role - Admin login ONLY allows administrative role
      if (user.role !== 'admin') {
        showToast("Access Denied: Customer accounts are forbidden from using the Admin Console.");
        return;
      }

      const testHash = sha256(pass + user.salt);
      if (testHash !== user.passwordHash) {
        showToast("Invalid password.");
        return;
      }

      // Successful auth - Record session
      const sessions = DB.get('sessions');
      const isAlreadyLoggedInToday = sessions.some(s => s.email === email && new Date(s.loginTime).toDateString() === new Date().toDateString());
      
      const newSessionToken = 'sess_' + Math.floor(100000 + Math.random() * 900000);
      const newSession = {
        id: newSessionToken,
        email: email,
        loginTime: new Date().toLocaleString(),
        device: navigator.userAgent.substring(0, 60) || 'Unknown Browser',
        ip: '192.168.1.' + Math.floor(10 + Math.random() * 200),
        status: 'Active'
      };
      sessions.push(newSession);
      DB.set('sessions', sessions);

      // Save user session in localStorage
      localStorage.setItem("nc_user", JSON.stringify(user));
      localStorage.setItem("nc_session_token", newSessionToken);

      // Redirect back to main admin dashboard
      window.location.href = "/admin-dashboard.html";
    });
  </script>
</body>
</html>
